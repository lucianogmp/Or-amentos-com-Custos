<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Master Print</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Sistema de Orçamentos Master Print</h1>
</header>

<div class="container">

  <div class="left">

    <div class="card">
      <h2>Cliente</h2>
      <input id="cliente" placeholder="Nome">
      <input id="telefone" placeholder="Telefone">
    </div>

    <div class="card">
      <h2>Tipo</h2>
      <select id="tipo">
        <option value="adesivo">Adesivo</option>
        <option value="lona">Lona / Banner</option>
      </select>
    </div>

    <div class="card">
      <h2>Medidas</h2>
      <input id="largura" placeholder="Largura (m)">
      <input id="altura" placeholder="Altura (m)">
      <input id="qtd" placeholder="Quantidade">
    </div>

    <div class="card">
      <h2>Configurações</h2>
      <input id="valorMetro" placeholder="Valor m²">
      <input id="material" placeholder="Material (R$)">
      <input id="arte" value="20" placeholder="Arte (%)">
      <input id="extra" placeholder="Aplicação / Acabamento (%)">
      <input id="mao" placeholder="Mão de obra (R$)">
    </div>

    <button onclick="calcular()">CALCULAR</button>

  </div>

  <div class="right">

    <div class="card resultado">
      <h2>Total</h2>
      <h1 id="total">R$ 0,00</h1>
      <p id="detalhe"></p>
    </div>

    <div class="card">
      <h2>Histórico</h2>
      <div id="historico"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
<script src="modules/adesivo.js"></script>
<script src="modules/lona.js"></script>
<script src="modules/storage.js"></script>

</body>
</html>
