<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
}

function switchTab(tab) {
  const panelForm = document.getElementById('panel-form');
  const panelHistory = document.getElementById('panel-history');
  const panelFolha = document.getElementById('panel-folha');

  const tabForm = document.getElementById('tab-form');
  const tabHistory = document.getElementById('tab-history');
  const tabFolha = document.getElementById('tab-folha');

  const active = ['border-brand-500', 'text-brand-600', 'dark:text-brand-400'];
  const inactive = ['border-transparent', 'text-slate-400', 'dark:text-slate-500', 'hover:text-slate-600', 'dark:hover:text-slate-300'];

  panelForm.classList.toggle('hidden', tab !== 'form');
  panelHistory.classList.toggle('hidden', tab !== 'history');
  panelFolha.classList.toggle('hidden', tab !== 'folha');

  [tabForm, tabHistory, tabFolha].forEach(btn => {
    const isActive =
      (btn === tabForm && tab === 'form') ||
      (btn === tabHistory && tab === 'history') ||
      (btn === tabFolha && tab === 'folha');

    active.forEach(c => btn.classList.toggle(c, isActive));
    inactive.forEach(c => btn.classList.toggle(c, !isActive));
  });
}

let lista = JSON.parse(localStorage.getItem("orcamentos")) || [];

const totalEl = document.getElementById("total");
const unitarioEl = document.getElementById("unitario");
const areaEl = document.getElementById("area");

function calcular() {
  const l = parseFloat(largura.value) / 100 || 0;
  const a = parseFloat(altura.value) / 100 || 0;
  const q = parseFloat(quantidade.value) || 1;

  // Material
  const materialEl = document.querySelector('input[name="material"]:checked');
  const material = materialEl ? materialEl.value : 'vinil';
  const v = material === 'vinil' ? 90 : 75;

  // Arte
  const arteEl = document.querySelector('input[name="arte"]:checked');
  const temArte = arteEl ? arteEl.value === 'sim' : false;

  const area = l * a;
  const valorBase = area * v;

  // Margem dinâmica
  let margem = 0;
  if (!temArte && valorBase > 0) {
    margem = Math.max(0.2 - 0.05 * Math.floor(valorBase / 100), 0.05);
  }

  const unitario = valorBase * (1 + margem);
  const total = unitario * q;

  // Atualiza tela
  totalEl.textContent = "R$ " + total.toFixed(2).replace('.', ',');
  unitarioEl.textContent = "R$ " + unitario.toFixed(2).replace('.', ',');
  areaEl.textContent = area.toFixed(2).replace('.', ',') + " m²";

  // Salva resultado
  window.resultado = {
    cliente: cliente.value || '',
    vendedor: vendedor.value || '',
    largura: parseFloat(largura.value) || 0,
    altura: parseFloat(altura.value) || 0,
    quantidade: q,
    area: area,
    unitario: unitario,
    total: total,
    data: new Date().toLocaleDateString('pt-BR'),
    valorM2: v,
    margemPercent: margem * 100,
    temArte: temArte,
    material: material
  };
}

function formatarTelefone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 6) {
    v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
  } else if (v.length > 2) {
    v = '(' + v.slice(0,2) + ') ' + v.slice(2);
  } else if (v.length > 0) {
    v = '(' + v;
  }
  input.value = v;
}

document.getElementById('telefone').addEventListener('input', function() {
  formatarTelefone(this);
});

function gerarPDF() {

  const pw = doc.internal.pageSize.getWidth();
  const mx = 15;
  const contentW = pw - mx * 2;
  let y = 12;

  function centerText(text, yPos, size, style) {
    doc.setFontSize(size);
    doc.setFont('helvetica', style || 'normal');
    doc.text(text, pw / 2, yPos, { align: 'center' });
  }

  function drawLine(yPos) {
    doc.setDrawColor(180);
    doc.setLineWidth(0.3);
    doc.line(mx, yPos, pw - mx, yPos);
  }

  if (logoBase64) {
    const logoW = 60;
    const logoH = 20;
    doc.addImage(logoBase64, 'PNG', (pw - logoW) / 2, y, logoW, logoH);
    y += logoH + 3;
  } else {
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.text("GRAFICA", pw / 2, y + 6, { align: 'center' });
    doc.setFontSize(24);
    doc.text("Master Print", pw / 2, y + 14, { align: 'center' });

  doc.setFont('helvetica', 'bolditalic');

  y += 6;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.text("WhatsApp: (33) 99813-9539   |   @gmasterprint", pw / 2, y, { align: 'center' });
  y += 4;
  doc.text("R. Elieser Pena, 67, Centro - Pote/MG", pw / 2, y, { align: 'center' });
  y += 5;

  drawLine(y);
  y += 7;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text("Nome:", mx, y);
  doc.setFont('helvetica', 'normal');

  y += 7;
  doc.setFont('helvetica', 'bold');

  doc.text(window.resultado.telefone || "Nao informado", mx + 24, y);

  doc.setFont('helvetica', 'bold');

  y += 7;

  doc.text(window.resultado.vendedor || "Nao informado", mx + 26, y);

  y += 5;

  const col1 = mx;

  doc.setFillColor(40, 40, 40);
  doc.rect(mx, y, contentW, rowH, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text("QUANT.", col1 + 2, y + 5.5);
  doc.text("DESCRICAO", col2 + 2, y + 5.5);
  doc.text("VALOR R$", col3 + 2, y + 5.5);
  doc.setTextColor(0, 0, 0);
  y += rowH;

  const r = window.resultado;

  const areaStr = "Area: " + r.area.toFixed(2) + " m2";

  doc.line(col2, y, col2, y + rowH * 2);
  doc.line(col3, y, col3, y + rowH * 2);
  doc.text(qtd, col1 + 10, y + 5.5, { align: 'center' });
  doc.text(descricao, col2 + 2, y + 5.5);
  doc.text(valorUnit, col3 + 2, y + 5.5);
  y += rowH;
  doc.setFontSize(8);
  doc.setTextColor(100);
  doc.text(areaStr, col2 + 2, y + 4);

  for (let i = 0; i < 5; i++) {
    doc.rect(mx, y, contentW, rowH, 'S');
    doc.line(col2, y, col2, y + rowH);
    doc.line(col3, y, col3, y + rowH);
    y += rowH;

  doc.setFillColor(40, 40, 40);
  doc.rect(mx, y, contentW, rowH + 2, 'F');
  doc.setTextColor(255, 255, 255);

  doc.save("orcamento_masterprint.pdf");
}

  function calcularFolha() {

  const tipo = document.querySelector('input[name="folha"]:checked').value;

  let folhaL = 0;
  let folhaA = 0;

  if (tipo === 'a4') {
    folhaL = 20;
    folhaA = 28.7;
  }

  if (tipo === 'a3') {
    folhaL = 28.7;
    folhaA = 41;
  }

  if (tipo === 'sra3') {
    folhaL = 31;
    folhaA = 44;
  }

  const adesivoL = parseFloat(document.getElementById("adesivoLargura").value) || 0;
  const adesivoA = parseFloat(document.getElementById("adesivoAltura").value) || 0;
  const quantidade = parseFloat(document.getElementById("quantidadeFolha").value) || 0;

  const esp = 0.03;

  // 🔵 NORMAL
  const normalL = Math.floor((folhaL + esp) / (adesivoL + esp));
  const normalA = Math.floor((folhaA + esp) / (adesivoA + esp));
  const totalNormal = normalL * normalA;

  // 🟢 ROTACIONADO (troca largura com altura)
  const rotL = Math.floor((folhaL + esp) / (adesivoA + esp));
  const rotA = Math.floor((folhaA + esp) / (adesivoL + esp));
  const totalRotacionado = rotL * rotA;

  // 🔥 ESCOLHE O MELHOR
  let naLargura, naAltura, total, rotacionado;

  if (totalRotacionado > totalNormal) {
    naLargura = rotL;
    naAltura = rotA;
    total = totalRotacionado;
    rotacionado = true;
  } else {
    naLargura = normalL;
    naAltura = normalA;
    total = totalNormal;
    rotacionado = false;
  }

  let folhas = 0;
  if (total > 0) {
    folhas = Math.ceil(quantidade / total);
  }

  document.getElementById("resLargura").textContent = naLargura;
  document.getElementById("resAltura").textContent = naAltura;
  document.getElementById("resTotal").textContent = total;
  document.getElementById("resFolhas").textContent = folhas;

  // 🧠 EXTRA (opcional - mostra se rotacionou)
  console.log(rotacionado ? "Melhor com rotação" : "Melhor sem rotação");
}
