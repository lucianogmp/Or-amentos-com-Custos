<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Master Print - Sistema</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>Sistema de Orçamentos</h1>
</header>

<div class="container">

  <!-- ESQUERDA -->
  <div class="left">

    <div class="card">
      <h2>ADESIVO</h2>

      <input type="number" id="a_largura" placeholder="Largura (m)">
      <input type="number" id="a_altura" placeholder="Altura (m)">
      <input type="number" id="a_qtd" placeholder="Quantidade">

      <input type="number" id="a_valorMetro" placeholder="Preço do m²">
      <input type="number" id="a_material" placeholder="Custo material total">

      <input type="number" id="a_arte" placeholder="Acréscimo arte (%)" value="20">
      <input type="number" id="a_aplicacao" placeholder="Aplicação (%)" value="20">

      <button onclick="calcularAdesivo()">Calcular Adesivo</button>
    </div>

    <div class="card">
      <h2>LONA / BANNER</h2>

      <input type="number" id="l_largura" placeholder="Largura (m)">
      <input type="number" id="l_altura" placeholder="Altura (m)">
      <input type="number" id="l_qtd" placeholder="Quantidade">

      <input type="number" id="l_valorMetro" placeholder="Preço do m²">

      <input type="number" id="l_arte" value="20" placeholder="Arte (%)">
      <input type="number" id="l_acabamento" value="20" placeholder="Acabamento (%)">

      <input type="number" id="l_mao" placeholder="Mão de obra (R$)">

      <button onclick="calcularLona()">Calcular Lona</button>
    </div>

  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="card resultado">
      <h2>RESULTADO</h2>

      <p>Adesivo:</p>
      <h3 id="resAdesivo">R$ 0,00</h3>

      <p>Lona:</p>
      <h3 id="resLona">R$ 0,00</h3>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
