<!-- SOMENTE TRECHO ALTERADO (CONFIGURAÇÕES FINANCEIRAS) -->

<section class="bg-white dark:bg-[#1a1f2e] rounded-2xl border border-slate-200 dark:border-[#2a3040] p-5 space-y-4 fade-in">
  <h3 class="text-xs font-semibold uppercase tracking-widest text-brand-600 dark:text-brand-400">
    Configurações Financeiras
  </h3>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

    <!-- VALOR -->
    <div class="space-y-1.5">
      <label class="block text-sm font-medium text-slate-600 dark:text-slate-400">
        Valor por m²
      </label>
      <input type="number" id="valor"
        class="w-full bg-slate-50 dark:bg-[#232a3a] border rounded-lg px-4 py-3 text-sm">
    </div>

    <!-- NOVO: TEM ARTE -->
    <div class="space-y-1.5">
      <label class="block text-sm font-medium text-slate-600 dark:text-slate-400">
        Tem arte?
      </label>

      <div class="flex gap-3">

        <label class="flex-1 cursor-pointer">
          <input type="radio" name="arte" value="sim" class="hidden peer" checked>
          <div class="text-center py-3 rounded-lg border border-slate-300
                      peer-checked:bg-green-500 peer-checked:text-white">
            Sim
          </div>
        </label>

        <label class="flex-1 cursor-pointer">
          <input type="radio" name="arte" value="nao" class="hidden peer">
          <div class="text-center py-3 rounded-lg border border-slate-300
                      peer-checked:bg-red-500 peer-checked:text-white">
            Não
          </div>
        </label>

      </div>
    </div>

  </div>

  <button onclick="calcular()"
    class="w-full bg-brand-600 text-white py-3 rounded-xl">
    Calcular Orçamento
  </button>
</section>
